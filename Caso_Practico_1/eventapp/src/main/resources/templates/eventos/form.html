<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventApp | SC-403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main>

    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="container my-4" style="max-width: 720px;">

        <h1 class="mb-4">
<!--            <i class="bi bi-mortarboard me-2"></i>-->
            <span th:text="${evento.id == null} ? 'Nuevo evento' : 'Editar evento'">Evento</span>
        </h1>

        <form method="post"
              th:object="${evento}"
              th:action="${evento.id == null}? @{/eventos}: @{/eventos/{id}(id=${evento.id})}"> <!--SI EL CURSO.ID ES NULL, SE CREA, SINO SE VA AL GET DE EDITAR-->

            <input type="hidden" th:field="*{id}">

            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label">Nombre del evento</label>
                <input type="text"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                       th:field="*{nombre}"
                       >
                <div class="invalid-feedback" th:errors="*{nombre}">Error</div>
            </div>


            <div class="mb-3">
                <label class="form-label">Descripcion</label>
                <textarea class="form-control"
                          rows="3"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                          th:field="*{descripcion}"></textarea>
                <div class="invalid-feedback" th:errors="*{descripcion}">Error</div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'"
                           th:field="*{fecha}">
                    <div class="invalid-feedback" th:errors="*{fecha}">Error</div>
                </div>


                <div class="col-md-8 mb-3">
                    <label class="form-label">Lugar</label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'"
                           th:field="*{lugar}">
                    <div class="invalid-feedback" th:errors="*{lugar}">Error</div>
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Organizador</label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('organizador')} ? 'is-invalid'"
                           th:field="*{organizador}">
                    <div class="invalid-feedback" th:errors="*{organizador}">Error</div>
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Categoria</label>
                    <input type="text"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'"
                           th:field="*{categoria}">
                    <div class="invalid-feedback" th:errors="*{categoria}">Error</div>
                </div>

            </select>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Cupo</label>
                    <input type="number"
                           class="form-control"
                           value="1"
                           min="1"
                           th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'"
                           th:field="*{cupoMaximo}">
                    <div class="invalid-feedback" th:errors="*{cupoMaximo}">Error</div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a class="btn btn-secondary" th:href="@{/eventos}">
                    <i class="bi bi-arrow-left me-1"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>
                    <span th:text="${evento.id == null} ? 'Crear' : 'Guardar cambios'">Guardar</span>
                </button>
            </div>

        </form>

    </main>

</main>
<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
