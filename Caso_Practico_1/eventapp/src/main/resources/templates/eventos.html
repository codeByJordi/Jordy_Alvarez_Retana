<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Catalogo de eventos</h1>
            <p class="text-muted mb-0">
                Total: <span class="badge bg-primary" th:text="${eventos.size()}">0</span>
            </p>

        </div>
        <!--
          TODO Caso Practico:
          Aca tenes que agregar el boton "Nuevo evento" que lleve al form de creacion.
        -->
        <a th:href="@{/eventos/nuevo}" class="btn btn-primary btn-lg">
            <i class="bi bi-calendar-event me-2"></i>Nuevo evento
        </a>
    </div>

    <!--
      TODO Caso Practico:
      Aca conviene mostrar los flash messages (ok / error) que vienen del controller.
    -->
    <div class="alert alert-success" th:if="${ok}" th:text="${ok}"></div>


    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" th:each="e, iter : ${eventos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge bg-secondary" th:text="${e.categoria}">categoria</span>
                        <small class="text-muted" th:text="${e.fecha}">2026-08-01</small>
                    </div>
                    <h5 class="card-title" th:text="${e.nombre}">Nombre del evento</h5>
                    <p class="text-muted small flex-grow-1" th:text="${e.descripcion}">
                        Descripcion breve del evento.
                    </p>
                    <div class="small text-muted mb-2">
                        <i class="bi bi-geo-alt me-1"></i><span th:text="${e.lugar}">Lugar</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small>
                            <span class="fw-bold" th:text="${e.cuposVendidos} + ' / ' + ${e.cupoMaximo}">0/0</span>
                            cupos
                        </small>
                    </div>
                    <!--
                      TODO Caso Practico:
                      Aca podes agregar los botones "Editar" y "Eliminar" para cada evento.
                      Recordar que "Eliminar" debe disparar un modal de confirmacion.
                    -->
                    <a class="btn btn-outline-primary btn-sm"
                       th:href="@{/eventos/{id}(id=${e.id})}">
                        Ver detalle
                        <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                    <a class="btn btn-outline-warning"
                       th:href="@{/eventos/{id}/editar(id=${e.id})}">
                        <i class="bi bi-pencil">Editar</i>
                    </a>
                    <button type="button"
                            class="btn btn-outline-danger btn-eliminar"
                            data-bs-toggle="modal"
                            data-bs-target="#modalEliminar"
                            th:data-id="${e.id}"
                            th:data-nombre="${e.nombre}">
                        <i class="bi bi-trash"></i> <!--obtiene el id-->
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-warning mt-4" th:if="${eventos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay eventos para mostrar.
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!--
  TODO Caso Practico:
  Cuando agregues el boton "Eliminar", aca al final del body
  va el modal de confirmacion + el script que toma el data-id
  de cada boton y lo inserta en la action del form de borrado.
-->
<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle me-2"></i>Eliminar evento
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <p>Estas seguro que queres eliminar el evento
                    <strong id="nombreEventoEliminar">...</strong>?
                </p>
                <p class="text-muted small mb-0">Esta accion no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post" th:action="@{/eventos/0/eliminar}">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i> Si, eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('modalEliminar');
        if (modal) {
            modal.addEventListener('show.bs.modal', (event) => {
                const boton = event.relatedTarget;
                const id = boton.getAttribute('data-id');
                const nombre = boton.getAttribute('data-nombre');
                document.getElementById('nombreEventoEliminar').textContent = nombre;
                document.getElementById('formEliminar').action = '/eventos/' + id + '/eliminar';
            });
        }
    });
</script>
</body>
</html>
