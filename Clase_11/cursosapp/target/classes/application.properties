spring.application.name=cursosapp
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

logging.level.root=INFO

# JPA + MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/cursoswebdb
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Mail - recuperacion de contrasena (S11 Parte G). Usar un SMTP de
# PRUEBA (Mailtrap o Ethereal) - NUNCA credenciales de un correo real en
# clase. El profesor comparte un inbox de Mailtrap para que todo el grupo
# vea los correos que "salen" de la app sin configurar nada individual.
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAILTRAP_USERNAME}
spring.mail.password=${MAILTRAP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
