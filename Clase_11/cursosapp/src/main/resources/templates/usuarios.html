<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | SC-403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <!--
      No hay ningun sec:authorize en esta pagina: toda la clase
      UsuarioController ya esta protegida con @PreAuthorize a nivel de
      CLASE (Parte F), asi que si llegaste hasta aca es porque ya sos ADMIN.
      El link del navbar (Parte F.3) es solo para no mostrarle el boton a
      quien de todas formas no puede entrar - la proteccion real es esta.
    -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Gestion de usuarios</h1>
            <p class="text-muted">
                Total: <span class="badge bg-primary" th:text="${usuarios.size()}">0</span>
            </p>
        </div>
        <a class="btn btn-primary" th:href="@{/usuarios/nuevo}">
            <i class="bi bi-person-plus me-1"></i> Nuevo usuario
        </a>
    </div>

    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${ok}">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${ok}">Operacion realizada</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}">Hubo un error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.username}">username</td>
                    <td th:text="${u.email}">email@ufide.ac.cr</td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.rol == 'ADMIN'} ? 'bg-danger' : 'bg-secondary'"
                              th:text="${u.rol}">ROL</span>
                    </td>
                    <td class="text-end">
                        <div class="btn-group btn-group-sm">
                            <a class="btn btn-outline-warning" th:href="@{/usuarios/{id}/editar(id=${u.id})}">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-outline-danger btn-eliminar"
                                    data-bs-toggle="modal" data-bs-target="#modalEliminar"
                                    th:data-id="${u.id}" th:data-nombre="${u.username}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="alert alert-warning mt-4" th:if="${usuarios.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i> No hay usuarios para mostrar.
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="bi bi-exclamation-triangle me-2"></i>Eliminar usuario
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Estas seguro que queres eliminar al usuario <strong id="nombreUsuarioEliminar">...</strong>?</p>
                <p class="text-muted small mb-0">Esta accion no se puede deshacer.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post" th:action="@{/usuarios/0/eliminar}">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i> Si, eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('modalEliminar');
    if (modal) {
      modal.addEventListener('show.bs.modal', (event) => {
        const boton = event.relatedTarget;
        const id = boton.getAttribute('data-id');
        const nombre = boton.getAttribute('data-nombre');
        document.getElementById('nombreUsuarioEliminar').textContent = nombre;
        document.getElementById('formEliminar').action = '/usuarios/' + id + '/eliminar';
      });
    }
  });
</script>

</body>
</html>
