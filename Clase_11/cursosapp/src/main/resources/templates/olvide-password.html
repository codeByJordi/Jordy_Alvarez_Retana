<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contrasena | SC-403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5" style="max-width: 420px;">
    <div class="card shadow border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-3 text-center brand-accent">
                <i class="bi bi-envelope-paper me-1"></i> Recuperar contrasena
            </h1>
            <p class="text-muted small text-center mb-4">
                Escribi el email con el que te registraste. Si existe en el sistema,
                te mandamos un enlace para elegir una contrasena nueva.
            </p>

            <div class="alert alert-success" th:if="${ok}">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${ok}">Mensaje</span>
            </div>

            <!--
              CLASE 11 - PASO G.6: notar que este formulario NUNCA le dice al
              usuario si el email existe o no en la base de datos - el
              mensaje de exito (arriba) es siempre el mismo. Ver
              PasswordResetController.procesarOlvide() y bibliografia_clase11.md.
            -->
            <form th:action="@{/olvide-password}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" autofocus required
                           placeholder="tu.email@ufide.ac.cr">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-send me-1"></i> Enviar enlace
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                <a th:href="@{/login}" class="small">
                    <i class="bi bi-arrow-left me-1"></i> Volver a iniciar sesion
                </a>
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
