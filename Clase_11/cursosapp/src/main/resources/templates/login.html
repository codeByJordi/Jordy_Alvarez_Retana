<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | SC-403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5" style="max-width: 420px;">
    <div class="card shadow border-0">
        <div class="card-body p-4">
            <h1 class="h4 mb-4 text-center brand-accent">
                <i class="bi bi-shield-lock me-1"></i> Iniciar sesion
            </h1>

            <!-- Spring Security redirige a /login?error si el usuario/password no son validos -->
            <div class="alert alert-danger" th:if="${param.error}">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Usuario o contrasena incorrectos.
            </div>

            <!-- Spring Security redirige a /login?logout despues de un logout exitoso -->
            <div class="alert alert-success" th:if="${param.logout}">
                <i class="bi bi-check-circle me-2"></i>
                Sesion cerrada correctamente.
            </div>

            <!--
              action="/login" y method="post": son el endpoint y metodo que
              formLogin() de Spring Security intercepta automaticamente.
              No existe un LoginController - Security maneja este POST solo.
              Al usar th:action, Thymeleaf + Spring Security agregan el
              token CSRF como campo oculto automaticamente (gratis).
            -->
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" name="username" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contrasena</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                </button>
            </form>

            <!--
              CLASE 11 - PASO G.5: descomentar. Link al flujo de recuperacion
              de contrasena (Parte G).
            -->

            <p class="text-center mt-3 mb-0">
                <a th:href="@{/olvide-password}" class="small">¿Olvidaste tu contrasena?</a>
            </p>


            <p class="text-muted small mt-3 mb-0">
                Usuarios de prueba (ver <code>seed-data.sql</code>):
                <code>admin / admin123</code> y <code>profesor / profesor123</code>.
            </p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
