<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contrasena | SC-403</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5" style="max-width: 420px;">
    <div class="card shadow border-0">
        <div class="card-body p-4">

            <!--
              CLASE 11 - PASO G.7: si el token no existe o ya vencio (30 min,
              ver UsuarioService.buscarPorTokenValido()), no se muestra el
              formulario - solo este mensaje. No se distingue "no existe" de
              "vencio": misma logica de no dar pistas que en olvide-password.html.
            -->
            <div th:if="${tokenInvalido}">
                <h1 class="h4 mb-3 text-center text-danger">
                    <i class="bi bi-x-circle me-1"></i> Enlace invalido o vencido
                </h1>
                <p class="text-muted small text-center">
                    Este enlace ya no es valido. Los enlaces de recuperacion duran 30 minutos
                    y solo se pueden usar una vez.
                </p>
                <p class="text-center mb-0">
                    <a th:href="@{/olvide-password}" class="btn btn-primary">Pedir un enlace nuevo</a>
                </p>
            </div>

            <div th:unless="${tokenInvalido}">
                <h1 class="h4 mb-4 text-center brand-accent">
                    <i class="bi bi-shield-lock me-1"></i> Elegi tu nueva contrasena
                </h1>

                <form th:action="@{/restablecer-password}" method="post">
                    <input type="hidden" name="token" th:value="${token}">
                    <div class="mb-3">
                        <label class="form-label">Contrasena nueva</label>
                        <input type="password" class="form-control" name="password"
                               autofocus required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle me-1"></i> Guardar contrasena
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
