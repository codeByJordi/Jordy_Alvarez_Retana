<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  Fragmento de navbar reutilizable.
  Para insertarlo en cualquier pagina:
    <div th:replace="~{fragments/header :: navbar}"></div>

  sec:authorize / sec:authentication vienen de thymeleaf-extras-springsecurity6
  (ver pom.xml). Permiten mostrar/ocultar partes del HTML segun si hay sesion
  activa, sin tocar el controller.
-->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark brand-bg px-4 shadow-sm">
    <a class="navbar-brand fw-bold" href="/?nombre=Estudiante">
        <i class="bi bi-mortarboard-fill me-2"></i>SC-403
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" href="/?nombre=Estudiante">Inicio</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/cursos">Cursos</a>
            </li>
            <!--
              CLASE 11 - PASO F.3: descomentar. Solo ADMIN ve el link a la
              gestion de usuarios. Recorda que esto es cosmetico (como en
              Parte E) - la proteccion real es el @PreAuthorize de clase en
              UsuarioController (Parte F).
            -->

            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" href="/usuarios">Usuarios</a>
            </li>

        </ul>
        <ul class="navbar-nav">
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <span class="nav-link text-white-50">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right me-1"></i>Salir
                    </button>
                </form>
            </li>
            <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="nav-link" href="/login">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesion
                </a>
            </li>
        </ul>
    </div>
</nav>

<!-- Fragmento de footer -->
<footer th:fragment="footer" class="footer-curso">
    <p>SC-403 - Desarrollo de Aplicaciones Web y Patrones</p>
    <p class="small text-muted">Universidad Fidelitas</p>
</footer>

</body>
</html>
